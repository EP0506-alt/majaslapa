Tas ir viens no daudzajiem Živernī dārza mākslinieka darbiem pēdējo trīsdesmit dzīves gadu laikā. Gleznā attēlotas īrisu rindas dažādos purpursarkanos un rozā toņos, kas izvietotas pa diagonāli pāri attēla plaknei. Ziedi atrodas zem kokiem, kas, laižot cauri raibu gaismu, maina savu krāsu toni. Aiz kokiem paveras skats uz Monē māju.[1]

Monē daiļrades kontekstā
Gadā, kad Monē pabeidza šo gleznu, viņam bija 60 gadi, un viņš bija radījis milzīgu darbu klāstu. Viņš bija guvis neparastus panākumus, kā arī slavenību.[2] Līdz tam laikam viņš arvien vairāk analizēja redzēto, līdz, pēc Viljama Zeica vārdiem, "subjekts, sajūta un gleznieciskais objekts ir gandrīz identiski".[3]

1900. gadā, šīs gleznas tapšanas gadā, viņš uzsāka divus lielus projektus — Temzas upes sēriju Londonā un vēl vienu savu ūdens dārzu sēriju Živernī, tostarp dažas no viņa slavenajām ūdensrožu gleznām, piemēram, "Ūdensrožu dīķis" (tagad atrodas Bostonas Tēlotājmākslas muzejā).

Viņa dīleris Durand-Ruel izstādīja jaunākos darbus, tostarp duci ūdensrožu[2], un viņš nopirka sava drauga Renoāra gleznu "Mošeja (Arābu svētki)".[2]

Dārzs
Monē strādāja pie dārza, kas ir gleznas temats, un attīstīja to no 1883. gada beigām līdz pat savas dzīves beigām.

Tas būtībā bija ziemciešu dārzs, ko izcēla viengadīgie augi. Monē noteica vairākus pamatprincipus, pie kuriem viņš vienmēr pieturējās: kaila zeme viņam bija anatēma; viņš izvairījās no tumšiem ziediem; turpretī viņam nekad nevarēja pietikt ar zilu... viņš ienīda atsevišķus ziedus, pieļaujot dubultus ziedus tikai rozēm un lakstaugu peonijām; un viņš ienīda raibu lapotni.[4]
